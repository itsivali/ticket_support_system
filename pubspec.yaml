name: ticket_support_system
description: "A ticket support system built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.6
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter:
    sdk: flutter
  flutter_chat_types: ^3.6.2
  flutter_chat_ui: ^1.6.9
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  intl: ^0.18.1
  logger: ^2.0.2+1
  mailer: ^6.0.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  faker: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true